<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local Storage – Name & Dark Mode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Local Storage Practice</h1>

    <section class="name-section">
      <h2>Your Name</h2>
      <input type="text" id="nameInput" placeholder="Enter your name..." />
      <div class="buttons">
        <button id="saveBtn">Save Name</button>
        <button id="removeBtn">Remove Name</button>
      </div>
      <p id="savedName">No name saved yet.</p>
    </section>

    <section class="darkmode-section">
      <button id="toggleDarkBtn">Toggle Dark Mode</button>
    </section>

    <section class="danger-zone">
      <button id="clearAllBtn">Clear All Data</button>
      <p class="small">(removes everything from localStorage)</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
